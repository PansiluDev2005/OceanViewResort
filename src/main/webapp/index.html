<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Ocean View Resort</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: url('https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
        background-size: cover;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4); /* Dark overlay for better text readability */
        z-index: 1;
      }
      .login-container {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 420px;
        padding: 15px;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        padding: 40px 30px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        color: white;
      }
      .glass-card h3 {
        font-weight: 700;
        margin-bottom: 5px;
        text-align: center;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .glass-card p.subtitle {
        text-align: center;
        font-weight: 300;
        margin-bottom: 30px;
        font-size: 0.9rem;
        opacity: 0.9;
      }
      .form-control {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: white;
        border-radius: 10px;
        padding: 12px 15px;
      }
      .form-control:focus {
        background: rgba(255, 255, 255, 0.3);
        border-color: #fff;
        color: white;
        box-shadow: 0 0 10px rgba(255,255,255,0.2);
      }
      .form-control::placeholder {
        color: rgba(255, 255, 255, 0.8);
      }
      .form-label {
        font-weight: 500;
        font-size: 0.9rem;
      }
      .btn-primary {
        background: linear-gradient(135deg, #007bff, #0056b3);
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        background: linear-gradient(135deg, #0056b3, #004494);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      }
      .input-group-text {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-right: none;
        color: white;
        border-radius: 10px 0 0 10px;
      }
      .form-control.with-icon {
        border-left: none;
        border-radius: 0 10px 10px 0;
      }
      .alert-glass {
        background: rgba(220, 53, 69, 0.2);
        border: 1px solid rgba(220, 53, 69, 0.5);
        color: #ffcccc;
        backdrop-filter: blur(5px);
      }
    </style>
  </head>
  <body>
    <div class="overlay"></div>
    <div class="container login-container">
      <div class="glass-card">
        <h3>Ocean View</h3>
        <p class="subtitle">Premium Resort & Spa</p>
        
        <form action="login" method="POST">
          <div class="mb-4">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
              <input type="text" class="form-control with-icon" id="username" name="username" placeholder="Enter your username" required />
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
              <input type="password" class="form-control with-icon" id="password" name="password" placeholder="Enter your password" required />
            </div>
          </div>
          <div class="d-grid mt-4 gap-2">
            <button type="submit" class="btn btn-primary d-flex justify-content-center align-items-center gap-2">
              <span>Sign In</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
            <a href="register.html" class="btn btn-outline-light d-flex justify-content-center align-items-center gap-2">
              <span>Register New Staff</span> <i class="fa-solid fa-user-plus"></i>
            </a>
          </div>
        </form>
      </div>
    </div>
    
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has("error")) {
        const errorDiv = document.createElement("div");
        errorDiv.className = "alert alert-glass mt-3 text-center mb-0 p-2 rounded-3";
        errorDiv.innerHTML = '<i class="fa-solid fa-circle-exclamation me-2"></i>Invalid username or password.';
        document.querySelector("form").prepend(errorDiv);
        const br = document.createElement("br");
        document.querySelector("form").insertBefore(br, errorDiv.nextSibling);
      }
    </script>
  </body>
</html>
