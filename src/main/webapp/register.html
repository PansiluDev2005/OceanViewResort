<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ocean View Resort</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>
<div class="container login-container">
    <div class="card shadow">
        <div class="card-header text-center bg-success text-white">
            <h4>Ocean View Resort</h4>
            <p class="mb-0">Staff Registration</p>
        </div>
        <div class="card-body">
            <form action="register" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">New Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Register</button>
                    <a href="index.html" class="btn btn-outline-secondary">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'alert alert-danger mt-3 text-center';
        errorDiv.textContent = 'Username already exists. Please choose another.';
        document.querySelector('.card-body').prepend(errorDiv);
    } else if (urlParams.has('success')) {
        const successDiv = document.createElement('div');
        successDiv.className = 'alert alert-success mt-3 text-center';
        successDiv.textContent = 'Registration successful! You can now login.';
        document.querySelector('.card-body').prepend(successDiv);
    }
</script>
</body>
</html>
