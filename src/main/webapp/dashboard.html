<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ocean View Resort</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Ocean View Resort</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navBar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navBar">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#" onclick="showSection('reservations')">Reservations</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showSection('add-reservation')">New Reservation</a>
                </li>
            </ul>
            <a href="login?action=logout" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div id="error-message" class="alert alert-danger d-none"></div>

    <!-- Reservations List -->
    <div id="reservations-section" class="section-part">
        <h3>Manage Reservations</h3>
        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
            <tr>
                <th>Res No</th>
                <th>Guest Name</th>
                <th>Contact</th>
                <th>Room Type</th>
                <th>Check-in</th>
                <th>Check-out</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="reservations-tbody">
            <!-- Data will be loaded via JS -->
            </tbody>
        </table>
    </div>

    <!-- Add/Edit Reservation Form -->
    <div id="add-reservation-section" class="section-part d-none">
        <h3 id="form-title">New Reservation</h3>
        <form action="reservation" method="POST" id="reservation-form" onsubmit="return validateForm()">
            <input type="hidden" name="action" id="form-action" value="add">
            <input type="hidden" name="resNo" id="resNo" value="0">
            <input type="hidden" name="guestId" id="guestId" value="0">
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Guest Name</label>
                    <input type="text" class="form-control" name="name" id="name" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Number (e.g. 123-456-7890)</label>
                    <input type="text" class="form-control" name="contact" id="contact" required>
                    <small class="text-danger d-none" id="contact-error">Invalid phone number format.</small>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control" name="address" id="address" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Room Type</label>
                    <select class="form-select" name="roomType" id="roomType" required>
                        <option value="Single">Single</option>
                        <option value="Double">Double</option>
                        <option value="Suite">Suite</option>
                        <option value="Ocean View">Ocean View</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Room Rate (Per Night)</label>
                    <input type="number" step="0.01" class="form-control" name="roomRate" id="roomRate" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Check-in Date</label>
                    <input type="date" class="form-control" name="checkIn" id="checkIn" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Check-out Date</label>
                    <input type="date" class="form-control" name="checkOut" id="checkOut" required>
                </div>
            </div>
            <button type="submit" class="btn btn-success">Save Reservation</button>
            <button type="button" class="btn btn-secondary" onclick="showSection('reservations')">Cancel</button>
        </form>
    </div>
</div>

<script src="js/validations.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === 'invalid_dates') {
        const errorDiv = document.getElementById('error-message');
        errorDiv.textContent = 'Check-out date must be after Check-in date (Validated by Server).';
        errorDiv.classList.remove('d-none');
    }

    function showSection(sectionId) {
        document.querySelectorAll('.section-part').forEach(sec => sec.classList.add('d-none'));
        document.getElementById(sectionId + '-section').classList.remove('d-none');
        
        if (sectionId === 'reservations') {
            loadReservations();
            document.getElementById('form-action').value = 'add';
            document.getElementById('form-title').innerText = 'New Reservation';
            document.getElementById('reservation-form').reset();
            document.getElementById('error-message').classList.add('d-none');
            document.getElementById('contact-error').classList.add('d-none');
        }
    }

    function loadReservations() {
        fetch('reservation?action=list')
            .then(res => {
                if(res.redirected) {
                    window.location.href = res.url;
                }
                return res.json();
            })
            .then(data => {
                const tbody = document.getElementById('reservations-tbody');
                tbody.innerHTML = '';
                data.forEach(r => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${r.resNo}</td>
                            <td>${r.name}</td>
                            <td>${r.contact}</td>
                            <td>${r.roomType}</td>
                            <td>${r.checkIn}</td>
                            <td>${r.checkOut}</td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick='editReservation(${JSON.stringify(r)})'>Edit</button>
                                <a href="billing?resNo=${r.resNo}" class="btn btn-sm btn-info text-white" target="_blank">Print Bill</a>
                                <a href="reservation?action=delete&resNo=${r.resNo}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this reservation?')">Delete</a>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error('Error loading reservations:', err));
    }

    function editReservation(r) {
        document.getElementById('form-action').value = 'update';
        document.getElementById('form-title').innerText = 'Edit Reservation';
        document.getElementById('resNo').value = r.resNo;
        document.getElementById('guestId').value = r.guestId;
        
        document.getElementById('name').value = r.name;
        document.getElementById('contact').value = r.contact;
        document.getElementById('address').value = r.address;
        document.getElementById('roomType').value = r.roomType;
        document.getElementById('roomRate').value = r.roomRate;
        document.getElementById('checkIn').value = r.checkIn;
        document.getElementById('checkOut').value = r.checkOut;
        
        showSection('add-reservation');
    }

    loadReservations();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
