<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ocean View Resort</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }
        /* Navbar Styling */
        .navbar {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Deep ocean gradient */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 15px 0;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: #fff !important;
        }
        .nav-link {
            font-weight: 500;
            color: rgba(255,255,255,0.8) !important;
            transition: color 0.3s;
            margin-right: 15px;
        }
        .nav-link:hover, .nav-link.active {
            color: #48cae4 !important; /* light blue cyan */
        }
        .btn-logout {
            background-color: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            border-radius: 20px;
            padding: 6px 20px;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background-color: #dc3545;
            border-color: #dc3545;
            color: #fff;
        }

        /* Hero Image Section */
        .hero {
            background: url('https://images.unsplash.com/photo-1618140052121-39fc6db33972?q=80&w=2070&auto=format&fit=crop') center center / cover no-repeat;
            position: relative;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: -50px;
        }
        .hero::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 40, 70, 0.6);
        }
        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .hero-content h1 {
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* Container & Cards */
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: auto;
            padding: 0 15px;
        }
        .content-card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            margin-bottom: 40px;
        }
        .section-title {
            font-weight: 600;
            color: #1a365d;
            margin-bottom: 25px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Table Styling */
        .table {
            vertical-align: middle;
        }
        .table thead th {
            border-bottom: none;
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .table tbody tr {
            transition: background-color 0.2s;
        }
        .table tbody tr:hover {
            background-color: #f8fafc;
        }
        .badge-room {
            background-color: #0284c7;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.8rem;
        }

        /* Buttons */
        .btn-custom {
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-action {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        /* Form elements */
        .form-label {
            font-weight: 500;
            color: #475569;
            font-size: 0.9rem;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 10px 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
            <i class="fa-solid fa-hotel"></i> Ocean View Resort
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navBar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navBar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active rounded px-3" href="#" onclick="showSection('reservations', this)"><i class="fa-solid fa-list-check me-1"></i> Reservations</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link rounded px-3" href="#" onclick="showSection('add-reservation', this)"><i class="fa-solid fa-plus-circle me-1"></i> New Reservation</a>
                </li>
            </ul>
            <a href="login?action=logout" class="btn btn-logout d-flex align-items-center gap-2">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<div class="hero">
    <div class="hero-content">
        <h1>Welcome back, Admin</h1>
        <p class="lead mb-0">Manage your resort reservations and operations</p>
    </div>
</div>

<div class="main-container">
    <div id="error-message" class="alert alert-danger d-none shadow-sm rounded-3"></div>

    <!-- Reservations List -->
    <div id="reservations-section" class="section-part content-card">
        <h3 class="section-title"><i class="fa-solid fa-users-gear text-primary"></i> Manage Reservations</h3>
        <div class="table-responsive mt-4">
            <table class="table table-hover border-top border-bottom">
                <thead>
                <tr>
                    <th>Res No</th>
                    <th>Guest Name</th>
                    <th>Contact</th>
                    <th>Room Type</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody id="reservations-tbody">
                <!-- Data will be loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Reservation Form -->
    <div id="add-reservation-section" class="section-part content-card d-none">
        <h3 id="form-title" class="section-title"><i class="fa-solid fa-file-pen text-success"></i> New Reservation</h3>
        <form action="reservation" method="POST" id="reservation-form" onsubmit="return validateForm()">
            <input type="hidden" name="action" id="form-action" value="add">
            <input type="hidden" name="resNo" id="resNo" value="0">
            <input type="hidden" name="guestId" id="guestId" value="0">
            
            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label">Guest Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-regular fa-user"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" name="name" id="name" required placeholder="Enter guest name">
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Number</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-solid fa-phone"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" name="contact" id="contact" required placeholder="e.g. 123-456-7890">
                    </div>
                    <small class="text-danger d-none mt-1" id="contact-error"><i class="fa-solid fa-circle-exclamation"></i> Invalid phone number format.</small>
                </div>
            </div>
            
            <div class="row mb-4">
                <div class="col-md-12">
                    <label class="form-label">Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-solid fa-location-dot"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" name="address" id="address" required placeholder="Enter full address">
                    </div>
                </div>
            </div>
            
            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label">Room Type</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-solid fa-bed"></i></span>
                        <select class="form-select border-start-0 ps-0" name="roomType" id="roomType" required>
                            <option value="Single">Single Room</option>
                            <option value="Double">Double Room</option>
                            <option value="Suite">Luxurious Suite</option>
                            <option value="Ocean View">Ocean View Room</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Room Rate (Per Night)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-solid fa-dollar-sign"></i></span>
                        <input type="number" step="0.01" class="form-control border-start-0 ps-0" name="roomRate" id="roomRate" required placeholder="0.00">
                    </div>
                </div>
            </div>
            
            <div class="row mb-5">
                <div class="col-md-6">
                    <label class="form-label">Check-in Date</label>
                    <input type="date" class="form-control" name="checkIn" id="checkIn" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Check-out Date</label>
                    <input type="date" class="form-control" name="checkOut" id="checkOut" required>
                </div>
            </div>
            
            <div class="d-flex gap-3 pt-3 border-top">
                <button type="submit" class="btn btn-success btn-custom px-4 py-2"><i class="fa-solid fa-check me-2"></i> Save Reservation</button>
                <button type="button" class="btn btn-light btn-custom px-4 py-2 border" onclick="showSection('reservations', document.querySelector('.nav-link'))"><i class="fa-solid fa-xmark me-2"></i> Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="js/validations.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === 'invalid_dates') {
        const errorDiv = document.getElementById('error-message');
        errorDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation me-2"></i> Check-out date must be after Check-in date (Validated by Server).';
        errorDiv.classList.remove('d-none');
    }

    // Function to handle Navigation styling
    function updateNavActive(clickedLink) {
        if(clickedLink) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active', 'bg-white', 'bg-opacity-10'));
            clickedLink.classList.add('active', 'bg-white', 'bg-opacity-10');
        }
    }

    function showSection(sectionId, element = null) {
        document.querySelectorAll('.section-part').forEach(sec => sec.classList.add('d-none'));
        document.getElementById(sectionId + '-section').classList.remove('d-none');
        
        updateNavActive(element);
        
        if (sectionId === 'reservations') {
            loadReservations();
            document.getElementById('form-action').value = 'add';
            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-file-pen text-success"></i> New Reservation';
            document.getElementById('reservation-form').reset();
            document.getElementById('error-message').classList.add('d-none');
            document.getElementById('contact-error').classList.add('d-none');
        }
    }

    function loadReservations() {
        const tbody = document.getElementById('reservations-tbody');
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted"><i class="fa-solid fa-spinner fa-spin me-2"></i> Loading reservations...</td></tr>';
        
        fetch('reservation?action=list')
            .then(res => {
                if(res.redirected) {
                    window.location.href = res.url;
                }
                return res.json();
            })
            .then(data => {
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No reservations found.</td></tr>';
                    return;
                }
                data.forEach(r => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold text-secondary">#${r.resNo}</td>
                            <td class="fw-semibold">${r.name}</td>
                            <td><i class="fa-solid fa-phone text-muted fa-sm me-1"></i> ${r.contact}</td>
                            <td><span class="badge text-bg-info text-white"><i class="fa-solid fa-bed me-1"></i> ${r.roomType}</span></td>
                            <td>${r.checkIn}</td>
                            <td>${r.checkOut}</td>
                            <td class="text-center">
                                <button class="btn btn-primary btn-action" onclick='editReservation(${JSON.stringify(r).replace(/'/g, "&apos;")})' title="Edit">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <a href="billing?resNo=${r.resNo}" class="btn btn-info btn-action text-white mx-1" target="_blank" title="Print Bill">
                                    <i class="fa-solid fa-file-invoice-dollar"></i>
                                </a>
                                <a href="reservation?action=delete&resNo=${r.resNo}" class="btn btn-danger btn-action" onclick="return confirm('Are you sure you want to delete this reservation?')" title="Delete">
                                    <i class="fa-solid fa-trash-can"></i>
                                </a>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => {
                console.error('Error loading reservations:', err);
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-danger"><i class="fa-solid fa-triangle-exclamation me-2"></i> Error loading reservations. Perhaps the server is offline or mock data is needed.</td></tr>';
            });
    }

    function editReservation(r) {
        document.getElementById('form-action').value = 'update';
        document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square text-primary"></i> Edit Reservation';
        document.getElementById('resNo').value = r.resNo;
        document.getElementById('guestId').value = r.guestId;
        
        document.getElementById('name').value = r.name;
        document.getElementById('contact').value = r.contact;
        document.getElementById('address').value = r.address;
        document.getElementById('roomType').value = r.roomType;
        document.getElementById('roomRate').value = r.roomRate;
        document.getElementById('checkIn').value = r.checkIn;
        document.getElementById('checkOut').value = r.checkOut;
        
        showSection('add-reservation', document.querySelectorAll('.nav-link')[1]);
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', () => {
        loadReservations();
    });
</script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
